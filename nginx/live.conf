limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=public_limit:10m rate=20r/s;

server {
    listen 80;
    server_name aboodfull2.site www.aboodfull2.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name aboodfull2.site www.aboodfull2.site;

    ssl_certificate /etc/letsencrypt/live/aboodfull2.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aboodfull2.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/aboodfull2.site/web;
    index index.html;

    client_max_body_size 50M;

    # ── Security Headers ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com https://fonts.googleapis.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; media-src 'self' blob:; connect-src 'self' wss: ws: https:; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Hide server version ──
    server_tokens off;
    charset utf-8;

    error_page 404 /404.html;
    location = /404.html {
        root /var/www/aboodfull2.site/web;
        internal;
    }

    # ── Static files ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Fonts with CORS ──
    location ~* \.(ttf|otf|woff|woff2)$ {
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── LLHLS Proxy ──
    location /llhls/ {
        proxy_pass http://127.0.0.1:3334/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    location ~ ^/live/stream/.*llhls {
        proxy_pass http://127.0.0.1:3334;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ── OvenMediaEngine WebRTC Signaling (WebSocket) ──
    location /ws/ {
        proxy_pass http://127.0.0.1:3333/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Rate-limited auth endpoints ──
    location /tracker-api/player-auth/verify {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass         http://127.0.0.1:9999/api/player-auth/verify;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }
    location /tracker-api/auth/login {
        limit_req zone=auth_limit burst=3 nodelay;
        proxy_pass         http://127.0.0.1:9999/api/auth/login;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    # ── Password verify (rate-limited) ──
    location /tracker-api/stream/password-verify {
        limit_req zone=auth_limit burst=3 nodelay;
        proxy_pass         http://127.0.0.1:9999/api/stream/password-verify;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    # ── SSE endpoint ──
    location /tracker-api/public/stats/live {
        proxy_pass         http://127.0.0.1:9999/api/public/stats/live;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Connection '';
        proxy_read_timeout 3600s;
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }

    # ── Public API (rate-limited) ──
    location /tracker-api/public/ {
        limit_req zone=public_limit burst=10 nodelay;
        proxy_pass         http://127.0.0.1:9999/api/public/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    # ── Public endpoints (matches, health, password-check) ──
    location /tracker-api/matches {
        limit_req zone=public_limit burst=5 nodelay;
        proxy_pass         http://127.0.0.1:9999/api/matches;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }
    location /tracker-api/stream/password-check {
        limit_req zone=public_limit burst=5 nodelay;
        proxy_pass         http://127.0.0.1:9999/api/stream/password-check;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    # ── Admin API (stricter rate limit) ──
    location /tracker-api/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass         http://127.0.0.1:9999/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # ── Direct /api/ proxy (for backwards compat) ──
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass         http://127.0.0.1:9999/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
