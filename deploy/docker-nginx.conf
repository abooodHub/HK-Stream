server {
    listen 80;
    server_name localhost;

    # واجهة الموقع والملفات الثابتة
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # تمرير طلبات API للـ Tracker على المضيف (network_mode: host)
    location /api/ {
        proxy_pass http://host.docker.internal:9999;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # الواجهة تستخدم /tracker-api/ — نفس الـ tracker
    location /tracker-api/ {
        proxy_pass http://host.docker.internal:9999/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # SSE
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # MediaMTX Low-Latency HLS (path: stream → /stream/index.m3u8)
    location /stream/ {
        proxy_pass http://host.docker.internal:8888/stream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Access-Control-Allow-Origin "*" always;
    }
}
