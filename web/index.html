<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
  <meta name="robots" content="noindex,nofollow"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#0a0a14"/>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>H&K — بث مباشر</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0a14;--bg2:#12121e;--bg3:#1a1a2e;
      --gold:#d4a843;--gold-l:#e8c96a;--gold-d:#a07d2e;
      --green:#22c55e;--red:#ef4444;
      --text:#f0f0f5;--text2:#9898a8;--text3:#5a5a6e;
      --radius:12px;
    }
    html{scroll-behavior:smooth}
    body{font-family:'Noto Sans Arabic','Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;line-height:1.5;-webkit-font-smoothing:antialiased}
    body.theater{overflow:hidden}

    /* ══ HEADER ══ */
    .h{position:sticky;top:0;z-index:200;background:rgba(10,10,20,.96);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.04)}
    .h-in{display:flex;align-items:center;height:52px;padding:0 20px;gap:16px;max-width:1400px;margin:0 auto}
    .h-brand{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
    .h-logo{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-weight:900;font-size:.6rem;color:#0a0a14;background:linear-gradient(135deg,var(--gold-l),var(--gold),var(--gold-d));flex-shrink:0}
    .h-name{font-family:'Inter',sans-serif;font-weight:800;font-size:.95rem;color:var(--text);letter-spacing:-.03em}
    .h-live{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:.3s}
    .h-live.on{background:var(--green);box-shadow:0 0 8px rgba(34,197,94,.5)}
    .h-match{display:none;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:5px 14px;flex:1;min-width:0;max-width:480px;cursor:pointer;text-decoration:none;color:var(--text);transition:.2s}
    .h-match:hover{background:rgba(255,255,255,.06)}
    .h-match.live{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.04)}
    .hm-tag{font-size:.55rem;font-weight:800;padding:2px 7px;border-radius:4px;flex-shrink:0;letter-spacing:.03em}
    .hm-tag.live{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.25)}
    .hm-tag.next{background:rgba(212,168,67,.1);color:var(--gold);border:1px solid rgba(212,168,67,.2)}
    .hm-tag.done{background:rgba(255,255,255,.04);color:var(--text3);border:1px solid rgba(255,255,255,.06)}
    .hm-teams{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
    .hm-t{display:flex;align-items:center;gap:5px;min-width:0}
    .hm-t.aw{flex-direction:row-reverse}
    .hm-crest{width:20px;height:20px;object-fit:contain;border-radius:3px;background:rgba(255,255,255,.05);padding:1px}
    .hm-name{font-size:.75rem;font-weight:600;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .hm-center{font-size:.85rem;font-weight:800;font-family:'Inter',sans-serif;padding:0 6px;flex-shrink:0}
    .hm-center.live-sc{color:var(--red)}
    .hm-center.tm{color:var(--gold)}
    .hm-cd{font-size:.55rem;font-weight:700;color:var(--gold-l);background:rgba(212,168,67,.08);border:1px solid rgba(212,168,67,.15);border-radius:5px;padding:2px 7px;font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;flex-shrink:0}
    .hm-cd.hot{color:var(--red);background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2)}
    .h-right{display:flex;align-items:center;gap:8px;margin-right:auto;flex-shrink:0}
    .h-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:600;color:var(--text2);background:rgba(255,255,255,.03);transition:.2s;text-decoration:none}
    .h-btn:hover{background:rgba(255,255,255,.07);color:var(--text)}
    .h-btn svg{flex-shrink:0}
    .h-viewers{display:flex;align-items:center;gap:4px;font-size:.78rem;font-weight:600;color:var(--text2);padding:5px 10px;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04)}
    .h-viewers b{color:var(--text);font-family:'Inter',sans-serif}
    @media(max-width:900px){.h-match{max-width:320px}.hm-name{max-width:55px}}
    @media(max-width:700px){.h-btn span{display:none}.h-btn{padding:5px 8px}}
    @media(max-width:500px){.h-match{display:none!important}.h-name{display:none}}

    /* ══ PLAYER ══ */
    .pw{width:100%;margin:0 auto;padding:0;transition:.3s}
    .pb{position:relative;width:100%;background:#000}
    body:not(.theater) .pb{max-width:1200px;margin:0 auto;border-radius:0 0 12px 12px;overflow:hidden}
    body.theater .pb{border-radius:0}

    .video-js{width:100%!important;height:0!important;padding-top:56.25%!important;background:#000}
    body.theater .video-js{padding-top:0!important;height:calc(100vh - 52px)!important}

    /* Custom controls override */
    .vjs-control-bar{display:flex!important;align-items:center;height:40px!important;padding:0 10px!important;background:linear-gradient(transparent,rgba(0,0,0,.9))!important;opacity:1!important;font-family:'Inter',sans-serif!important}
    .vjs-control-bar>button{width:auto!important;height:auto!important;margin:0 2px!important;font-size:0!important}
    .vjs-play-progress,.vjs-volume-level{background:var(--gold)!important}
    .vjs-slider{background:rgba(255,255,255,.15)!important}
    .vjs-play-progress::before{color:var(--gold)!important}
    .vjs-fullscreen-control{margin-right:auto!important;margin-left:0!important}
    .vjs-icon-placeholder .vjs-icon-placeholder:before{font-size:1.1em!important}

    /* Buffering */
    .hk-buf{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:5;pointer-events:none}
    .hk-buf.hide{display:none}
    .hk-spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}

    /* Big play */
    .hk-big{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:6;cursor:pointer}
    .hk-big.hide{display:none}
    .hk-big-i{width:56px;height:56px;border-radius:50%;background:rgba(212,168,67,.9);display:flex;align-items:center;justify-content:center;transition:transform .2s;box-shadow:0 4px 20px rgba(0,0,0,.4)}
    .hk-big:hover .hk-big-i{transform:scale(1.06)}

    /* Offline */
    .hk-off{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:rgba(0,0,0,.6);z-index:4;color:var(--text2);font-size:.85rem;pointer-events:none}
    .hk-off.hide{display:none}
    .hk-off svg{width:36px;height:36px;opacity:.2}

    /* ══ CONTENT BELOW ══ */
    .content{max-width:1200px;margin:0 auto;padding:20px}
    .info-card{background:var(--bg2);border:1px solid rgba(255,255,255,.05);border-radius:var(--radius);padding:20px;margin-bottom:16px}
    .info-card h2{font-size:1rem;font-weight:700;margin-bottom:8px}
    .info-card p{font-size:.85rem;color:var(--text2);line-height:1.6}

    /* Match detail card */
    .md{display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid rgba(255,255,255,.04)}
    .md:last-child{border-bottom:none}
    .md-teams{display:flex;align-items:center;gap:12px;flex:1}
    .md-t{display:flex;align-items:center;gap:8px}
    .md-t.aw{flex-direction:row-reverse}
    .md-crest{width:32px;height:32px;object-fit:contain}
    .md-info{text-align:center;min-width:0}
    .md-tname{font-size:.85rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}
    .md-score{font-size:1.4rem;font-weight:900;font-family:'Inter',sans-serif;padding:0 12px;min-width:60px;text-align:center}
    .md-score.live{color:var(--red)}
    .md-time{font-size:.8rem;color:var(--gold);font-family:'Inter',sans-serif;font-weight:600}
    .md-tag{font-size:.5rem;font-weight:800;padding:3px 8px;border-radius:4px;text-transform:uppercase}
    .md-tag.live{background:rgba(239,68,68,.12);color:var(--red)}
    .md-tag.next{background:rgba(212,168,67,.1);color:var(--gold)}
    .md-tag.done{background:rgba(255,255,255,.04);color:var(--text3)}

    /* Next match highlight */
    .next-highlight{background:linear-gradient(135deg,rgba(212,168,67,.06),rgba(212,168,67,.02));border:1px solid rgba(212,168,67,.12);border-radius:var(--radius);padding:20px;margin-bottom:16px}
    .nh-label{font-size:.65rem;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
    .nh-teams{display:flex;align-items:center;justify-content:center;gap:20px}
    .nh-t{text-align:center}
    .nh-crest{width:48px;height:48px;object-fit:contain;margin:0 auto 6px}
    .nh-name{font-size:.9rem;font-weight:700}
    .nh-vs{font-size:1.2rem;font-weight:900;color:var(--gold);font-family:'Inter',sans-serif}
    .nh-cd{margin-top:12px;text-align:center;font-size:1.4rem;font-weight:800;font-family:'Inter',sans-serif;color:var(--gold-l);letter-spacing:.04em}
    .nh-date{margin-top:6px;text-align:center;font-size:.75rem;color:var(--text2)}

    /* Footer */
    .ft{text-align:center;padding:24px;font-size:.7rem;color:var(--text3);border-top:1px solid rgba(255,255,255,.04)}

    /* ══ PASSWORD ══ */
    #pw{position:fixed;inset:0;z-index:10000;display:none;align-items:center;justify-content:center;padding:16px;background:rgba(10,10,20,.97);backdrop-filter:blur(24px)}
    #pw>div{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:28px;width:100%;max-width:360px;text-align:center}
    .pw-t{font-family:'Inter',sans-serif;font-size:1.8rem;font-weight:900;color:var(--gold);margin-bottom:8px}
    #pw h3{font-size:1rem;font-weight:700;margin-bottom:4px}
    #pw p{font-size:.8rem;color:var(--text2);margin-bottom:18px}
    #pw input{width:100%;padding:10px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:#fff;font-family:inherit;font-size:.95rem;outline:none;text-align:center;margin-bottom:12px;transition:.2s}
    #pw input:focus{border-color:var(--gold)}
    #pw button{width:100%;padding:10px;background:var(--gold);border:none;border-radius:8px;color:#0a0a14;font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer}
    #pw button:hover{background:var(--gold-l)}
    #pw-err{color:var(--red);font-size:.8rem;font-weight:700;margin-top:10px;display:none}
  </style>
</head>
<body class="theater">

  <!-- HEADER -->
  <header class="h">
    <div class="h-in">
      <a class="h-brand" href="/">
        <div class="h-logo">HK</div>
        <span class="h-name">H &amp; K</span>
        <span class="h-live" id="hLive"></span>
      </a>

      <a class="h-match" id="hMatch" href="/matches.html" target="_blank">
        <span class="hm-tag" id="hmTag"></span>
        <div class="hm-teams">
          <span class="hm-t">
            <img class="hm-crest" id="hmHC" alt="" onerror="this.style.display='none'">
            <span class="hm-name" id="hmHN"></span>
          </span>
          <span class="hm-center" id="hmC"></span>
          <span class="hm-t aw">
            <span class="hm-name" id="hmAN"></span>
            <img class="hm-crest" id="hmAC" alt="" onerror="this.style.display='none'">
          </span>
        </div>
        <span class="hm-cd" id="hmCd" style="display:none"></span>
      </a>

      <div class="h-right">
        <div class="h-viewers">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
          <b id="vCount">0</b>
        </div>
        <a class="h-btn" href="/matches.html" target="_blank">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3h1.5v3H16V8h1.5l-2.5-2.5L9.5 8H11v3H9.5V8H8v3H6.5V8H5L8 5.5 11 8zm7 13H5V8h14v11z"/></svg>
          <span>المباريات</span>
        </a>
      </div>
    </div>
  </header>

  <!-- PLAYER -->
  <div class="pw">
    <div class="pb">
      <video id="vid" class="video-js vjs-default-skin vjs-big-play-centered" playsinline>
        <p>المتصفح لا يدعم تشغيل الفيديو</p>
      </video>
      <div class="hk-buf" id="hkBuf"><div class="hk-spin"></div></div>
      <div class="hk-big" id="hkBig"><div class="hk-big-i"><svg width="24" height="24" viewBox="0 0 24 24" fill="#0a0a14"><path d="M8 5v14l11-7z"/></svg></div></div>
      <div class="hk-off" id="hkOff"><svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg><span>البث غير متصل</span></div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="contentArea"></div>

  <footer class="ft">H&K Stream</footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
  <link rel="stylesheet" href="https://vjs.zencdn.net/8.10.0/video-js.css"/>
  <script src="/js/matches-common.js?v=6"></script>

  <script>
  (function(){
    var hls=null,player=null,hbTimer=null;
    var M3U8=location.protocol+'//'+location.host+'/llhls/app/stream/master.m3u8';
    var isLive=false;

    function initHLS(){
      var vid=document.getElementById('vid');
      if(!vid)return;

      if(Hls.isSupported()){
        hls=new Hls({
          liveSyncDurationCount:3,liveMaxLatencyDurationCount:6,
          maxBufferLength:15,maxMaxBufferLength:30,backBufferLength:30,
          lowLatencyMode:true,enableWorker:true
        });
        hls.loadSource(M3U8);
        hls.attachMedia(vid);
        hls.on(Hls.Events.MANIFEST_PARSED,function(){
          document.getElementById('hkBig').classList.remove('hide');
          vid.play().catch(function(){document.getElementById('hkBig').classList.remove('hide')});
        });
        hls.on(Hls.Events.ERROR,function(e,d){if(d.fatal){hls.destroy();hls=null;setTimeout(initHLS,3000)}});
        vid.addEventListener('waiting',function(){document.getElementById('hkBuf').classList.remove('hide')});
        vid.addEventListener('playing',function(){document.getElementById('hkBuf').classList.add('hide');document.getElementById('hkOff').classList.add('hide')});
      }else if(vid.canPlayType('application/vnd.apple.mpegurl')){
        vid.src=M3U8;
        vid.addEventListener('loadedmetadata',function(){vid.play().catch(function(){})});
      }else{
        document.getElementById('hkOff').classList.remove('hide');
      }

      /* Big play click */
      document.getElementById('hkBig').onclick=function(){
        this.classList.add('hide');
        if(vid.paused)vid.play().catch(function(){});
      };
      vid.onclick=function(){
        var b=document.getElementById('hkBig');
        if(vid.paused){b.classList.remove('hide');vid.play().catch(function(){})}
        else{vid.pause();b.classList.remove('hide')}
      };

      startHB();
    }

    function startHB(){
      if(hbTimer)clearInterval(hbTimer);
      hbTimer=setInterval(function(){
        fetch('/tracker-api/heartbeat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({quality:'source',player_type:'main'}),keepalive:true}).catch(function(){});
      },15000);
    }

    document.addEventListener('DOMContentLoaded',initHLS);
    window._initPlayer=initHLS;
  })();

  /* ══ PASSWORD ══ */
  function _showPW(){$('pw').style.display='flex'}
  function _hidePW(){$('pw').style.display='none'}
  function $(id){return document.getElementById(id)}

  function verifyPW(pass,silent){
    var p={password:pass};
    var tEl=document.querySelector('[name="cf-turnstile-response"]');
    if(tEl&&tEl.value)p['cf-turnstile-response']=tEl.value;
    fetch('/tracker-api/stream/password-verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)})
    .then(function(r){return r.json()}).then(function(d){
      if(d.valid){localStorage.setItem('stream_password',pass);_hidePW();window._initPlayer()}
      else{localStorage.removeItem('stream_password');if(!silent){$('pw-err').style.display='block';$('pw-in').style.borderColor='var(--red)';$('pw-in').value=''}else _showPW()}
    }).catch(function(){window._initPlayer()});
  }

  function initPlayer(){
    fetch('/tracker-api/stream/password-check',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}',cache:'no-store'})
    .then(function(r){return r.json()}).then(function(d){
      if(d.protected){var s=localStorage.getItem('stream_password')||'';if(s)verifyPW(s,true);else _showPW()}
      else window._initPlayer();
    }).catch(function(){window._initPlayer()});
  }

  function submitPW(){var p=$('pw-in').value;if(p)verifyPW(p,false)}

  /* ══ MATCH CARD ══ */
  var _mt=null,_lmT=null,_lmD=null,_lmS=null,_upUtc=null,_isLive=false,_kickFired=false;
  function _hmT(u){try{return window.saudiTime(u)}catch(e){return''}}
  function _fmtTime(ms){var ts=Math.floor(ms/1000),h=Math.floor(ts/3600),m=Math.floor((ts%3600)/60),s=ts%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}
  function _fmtMatch(ms){var ts=Math.floor(ms/1000),half=Math.floor(ts/2700),min=Math.floor((ts%2700)/60);return(half>=1?(45+min):min)+':'+String(ts%60).padStart(2,'0')}

  function _fillCard(m,st){
    var ce=$('hMatch'),te=$('hmTag'),hc=$('hmHC'),hn=$('hmHN'),cc=$('hmC'),ac=$('hmAC'),an=$('hmAN'),cd=$('hmCd');
    if(!ce||!m){if(ce)ce.style.display='none';return}
    var isL=(st==='live'),isD=(st==='done'),h=m.homeTeam||{},a=m.awayTeam||{},sc=m.score||{};
    hc.src=h.crest||'';hn.textContent=teamAr(h.shortName||h.name||'');
    ac.src=a.crest||'';an.textContent=teamAr(a.shortName||a.name||'');
    te.className='hm-tag';
    if(isL){te.textContent='LIVE';te.classList.add('live')}
    else if(isD){te.textContent='FT';te.classList.add('done')}
    else{te.textContent='NEXT';te.classList.add('next')}
    if(isL){cc.className='hm-center live-sc';cc.textContent=(sc.home!=null?sc.home:0)+' - '+(sc.away!=null?sc.away:0)}
    else if(isD){cc.className='hm-center';cc.textContent=(sc.home!=null?sc.home:0)+' - '+(sc.away!=null?sc.away:0)}
    else{cc.className='hm-center tm';cc.textContent=_hmT(m.utcDate)}
    if(cd)cd.style.display='none';
    ce.classList.toggle('live',isL);ce.style.display='flex';

    /* Content area match detail */
    _renderContent(m,st);
  }

  function _renderContent(m,st){
    if(!m)return;
    var ca=$('contentArea');if(!ca)return;
    var h=m.homeTeam||{},a=m.awayTeam||{},sc=m.score||{};
    var isL=(st==='live'),isD=(st==='done'),isN=(st==='upcoming');
    var html='';

    if(isN&&m.utcDate){
      var diff=new Date(m.utcDate).getTime()-Date.now();
      var cdText=_fmtTime(Math.max(0,diff));
      html+='<div class="next-highlight">';
      html+='<div class="nh-label">المباراة القادمة</div>';
      html+='<div class="nh-teams">';
      html+='<div class="nh-t"><img class="nh-crest" src="'+(h.crest||'')+'" alt="" onerror="this.style.display=\'none\'"><div class="nh-name">'+teamAr(h.shortName||h.name||'')+'</div></div>';
      html+='<div class="nh-vs">VS</div>';
      html+='<div class="nh-t"><img class="nh-crest" src="'+(a.crest||'')+'" alt="" onerror="this.style.display=\'none\'"><div class="nh-name">'+teamAr(a.shortName||a.name||'')+'</div></div>';
      html+='</div>';
      html+='<div class="nh-cd" id="nhCd">'+cdText+'</div>';
      html+='<div class="nh-date">'+_hmT(m.utcDate)+'</div>';
      html+='</div>';
    }

    html+='<div class="info-card">';
    html+='<div class="md">';
    html+='<div class="hm-tag '+(isL?'live':isD?'done':'next')+'">'+(isL?'LIVE':isD?'FT':'NEXT')+'</div>';
    html+='<div class="md-teams">';
    html+='<div class="md-t"><img class="md-crest" src="'+(h.crest||'')+'" alt="" onerror="this.style.display=\'none\'"><div class="md-tname">'+teamAr(h.shortName||h.name||'')+'</div></div>';
    html+='<div class="md-score '+(isL?'live':'')+'">'+(sc.home!=null?sc.home:0)+' - '+(sc.away!=null?sc.away:0)+'</div>';
    html+='<div class="md-t aw"><div class="md-tname">'+teamAr(a.shortName||a.name||'')+'</div><img class="md-crest" src="'+(a.crest||'')+'" alt="" onerror="this.style.display=\'none\'"></div>';
    html+='</div>';
    html+='</div>';
    html+='</div>';

    html+='<div class="info-card"><h2>معلومات البث</h2><p>يتم البث عبر SRT على منصة H&amp;K Stream. الجودة المتوفرة هي المصدر مباشرة بدون تحويل.</p></div>';

    ca.innerHTML=html;
  }

  function updateMatch(matches){
    matches=(matches||[]).filter(function(m){return m.status!=='CANCELLED'&&m.status!=='POSTPONED'});
    var now=Date.now(),sorted=matches.slice().sort(function(a,b){return new Date(a.utcDate)-new Date(b.utcDate)});
    var live=sorted.filter(function(m){return STATUS_LIVE[m.status]});
    var upcoming=sorted.filter(function(m){return!STATUS_DONE[m.status]&&!STATUS_LIVE[m.status]&&new Date(m.utcDate).getTime()>now-60000});
    var done=sorted.filter(function(m){return STATUS_DONE[m.status]});
    var primary=null,ps=null;
    if(live.length){primary=live[0];ps='live'}
    else if(upcoming.length){primary=upcoming[0];ps='upcoming'}
    else if(done.length){primary=done[done.length-1];ps='done'}
    _fillCard(primary,ps);
    var dot=$('hLive');if(dot)dot.classList.toggle('on',ps==='live');
    _isLive=(ps==='live');_lmD=primary;
    _upUtc=(ps==='upcoming'&&primary)?primary.utcDate:null;_kickFired=false;
    if(_isLive&&primary){_lmS=new Date(primary.utcDate).getTime();startLC();startAR()}else{stopLC();stopAR()}
    scheduleSR();
  }

  function startLC(){stopLC();_lmT=setInterval(function(){
    if(!_lmS||!_lmD)return;var el=Date.now()-_lmS;
    var cc=$('hmC'),cd=$('hmCd');
    if(cc){var sc=_lmD.score||{};cc.textContent=(sc.home!=null?sc.home:0)+' - '+(sc.away!=null?sc.away:0)}
    if(cd){cd.textContent=_fmtMatch(el);cd.style.display='inline-flex'}
  },1000)}
  function stopLC(){if(_lmT){clearInterval(_lmT);_lmT=null}}
  var _arT=null;
  function startAR(){stopAR();_arT=setInterval(function(){if(window.loadMatches)loadMatches()},30000)}
  function stopAR(){if(_arT){clearInterval(_arT);_arT=null}}
  function scheduleSR(){
    if(_mt)clearTimeout(_mt);
    var iv=_isLive?60000:(_upUtc?((new Date(_upUtc).getTime()-Date.now()<300000)?30000:300000):300000);
    _mt=setTimeout(function(){if(window.loadMatches)loadMatches()},iv);
  }

  (function(){
    window.loadMatches=function(){
      fetch('/tracker-api/matches').then(function(r){return r.json()}).then(function(d){updateMatch(d.matches||[])}).catch(function(){scheduleSR()});
    };
    document.addEventListener('DOMContentLoaded',function(){loadMatches();initPlayer()});
  })();

  setInterval(function(){
    var now=Date.now();
    if(_upUtc&&!_isLive){
      var diff=new Date(_upUtc).getTime()-now;
      var cd=$('hmCd'),ce=$('hMatch');
      if(cd&&ce&&ce.style.display!=='none'){
        if(diff>0){cd.textContent=_fmtTime(diff);cd.style.display='inline-flex';cd.classList.toggle('hot',diff<300000)}
        else cd.style.display='none';
      }
      var ncd=document.getElementById('nhCd');
      if(ncd){ncd.textContent=diff>0?_fmtTime(diff):''}
    }
    if(_upUtc){var d=new Date(_upUtc).getTime()-now;if(d<=0&&!_kickFired){_kickFired=true;if(window.loadMatches)loadMatches()}}
  },1000);

  /* SSE */
  (function(){
    if(!window.EventSource)return;
    var es=new EventSource('/tracker-api/public/stats/live');
    var retries=0;
    es.onmessage=function(e){retries=0;try{var d=JSON.parse(e.data);var vc=$('vCount');if(vc)vc.textContent=d.viewers||0;var dot=$('hLive');if(dot)dot.classList.toggle('on',!!d.online)}catch(e){}};
    es.onerror=function(){es.close();retries++;setTimeout(function(){var es2=new EventSource('/tracker-api/public/stats/live');es=es2},Math.min(retries*3000,30000))};
  })();

  /* Init */
  (function(){
    if(localStorage.getItem('theater')==='off')document.body.classList.remove('theater');
    else document.body.classList.add('theater');
  })();

  if('serviceWorker' in navigator)window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(){})});
  </script>
