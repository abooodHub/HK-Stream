<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
  <meta name="robots" content="noindex,nofollow"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#07070f"/>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>H&K — بث مباشر</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/fonts.css?v=2"/>
  <link rel="stylesheet" href="/css/common.css?v=306"/>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    :root {
      --hdr-h: 56px;
      --player-max: 960px;
    }

    /* ══ HEADER ══ */
    .hdr{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:var(--hdr-h);gap:12px;direction:ltr;background:rgba(7,7,16,.94);backdrop-filter:blur(32px) saturate(180%);border-bottom:1px solid rgba(201,162,39,.06);position:sticky;top:0;z-index:100;transition:background .3s}
    .hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,rgba(201,162,39,.15) 50%,transparent 95%);pointer-events:none}

    .hdr-left{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .hdr-logo{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-weight:900;font-size:.7rem;color:#07070f;background:linear-gradient(135deg,#ffe9a8 0%,#f5d87a 30%,#C9A227 65%,#8c6f15 100%);box-shadow:0 2px 12px -2px rgba(201,162,39,.45);position:relative;overflow:hidden;cursor:pointer;transition:transform .2s}
    .hdr-logo::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.35) 0%,transparent 45%);border-radius:inherit;pointer-events:none}
    .hdr-logo:hover{transform:scale(1.05)}
    .hdr-brand{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.05rem;letter-spacing:-.02em;background:linear-gradient(135deg,var(--gold-xl),var(--gold-l) 60%,var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer}
    .hdr-dot{width:7px;height:7px;border-radius:50%;background:#333;transition:all .3s;flex-shrink:0}
    .hdr-dot.on{background:var(--green);box-shadow:0 0 8px rgba(62,207,130,.5);animation:dotPulse 2s infinite}
    @keyframes dotPulse{0%,100%{box-shadow:0 0 8px rgba(62,207,130,.5)}50%{box-shadow:0 0 16px rgba(62,207,130,.8)}}

    /* ══ MATCH CARD ══ */
    .match-card{display:none;align-items:center;gap:12px;background:linear-gradient(135deg,rgba(255,255,255,.03),rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:8px 16px;cursor:pointer;text-decoration:none;color:var(--text);transition:all .25s;white-space:nowrap;max-width:420px}
    .match-card:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1)}
    .match-card.is-live{border-color:rgba(220,40,40,.3);background:linear-gradient(135deg,rgba(220,40,40,.06),rgba(220,40,40,.02));animation:liveGlow 3s ease-in-out infinite}
    .match-card.is-done{opacity:.45}
    @keyframes liveGlow{0%,100%{box-shadow:0 0 0 0 rgba(220,40,40,0)}50%{box-shadow:0 0 24px -4px rgba(220,40,40,.12)}}
    .mc-tag{font-size:.5rem;font-weight:800;padding:2px 8px;border-radius:5px;letter-spacing:.02em;flex-shrink:0;line-height:1.4}
    .mc-tag.live{background:rgba(220,40,40,.2);color:#ff5252;border:1px solid rgba(220,40,40,.3)}
    .mc-tag.next{background:rgba(201,162,39,.1);color:var(--gold);border:1px solid rgba(201,162,39,.2)}
    .mc-tag.done{background:rgba(255,255,255,.05);color:var(--text3);border:1px solid rgba(255,255,255,.06)}
    .mc-teams{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
    .mc-team{display:flex;align-items:center;gap:6px;min-width:0}
    .mc-team.aw{flex-direction:row-reverse}
    .mc-crest{width:24px;height:24px;object-fit:contain;border-radius:4px;background:rgba(255,255,255,.04);padding:1px}
    .mc-name{font-size:.8rem;font-weight:700;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .mc-center{font-size:.95rem;font-weight:900;font-family:'Outfit',sans-serif;padding:0 8px;flex-shrink:0}
    .mc-center.live-sc{color:#ff5252}
    .mc-center.time{color:var(--gold);font-size:.85rem}
    .mc-cd{font-size:.58rem;font-weight:700;color:var(--gold-l);background:rgba(201,162,39,.08);border:1px solid rgba(201,162,39,.15);border-radius:6px;padding:2px 8px;font-variant-numeric:tabular-nums;flex-shrink:0;font-family:'Outfit',sans-serif}
    .mc-cd.hot{color:#ff5252;background:rgba(220,40,40,.1);border-color:rgba(220,40,40,.2)}

    .hdr-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .hdr-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:9px;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.8rem;font-weight:700;transition:all .2s;color:var(--text2);background:rgba(255,255,255,.03)}
    .hdr-btn:hover{background:rgba(255,255,255,.07);color:var(--text)}
    .hdr-btn svg{flex-shrink:0}
    .hdr-btn-lbl{display:block}
    .v-badge{display:flex;align-items:center;gap:4px;font-size:.8rem;font-weight:700;color:var(--text2);padding:5px 10px;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04)}
    .v-badge b{color:var(--text);font-family:'Outfit',sans-serif}
    @media(max-width:900px){.match-card{max-width:300px;padding:6px 10px}.mc-name{max-width:60px}}
    @media(max-width:700px){.hdr-btn-lbl{display:none}.hdr-btn{padding:5px 8px}.mc-name{max-width:48px}}
    @media(max-width:500px){.match-card{display:none!important}.hdr-brand{display:none}}

    /* ══ PLAYER ══ */
    .p-wrap{width:100%;max-width:var(--player-max);margin:0 auto;padding:12px 12px 0;transition:all .3s}
    .p-box{position:relative;width:100%;border-radius:16px;overflow:hidden;background:#000;box-shadow:0 8px 48px rgba(0,0,0,.6)}
    .p-ratio{position:relative;width:100%;padding-top:56.25%}
    .p-inner{position:absolute;inset:0}
    body.theater .p-wrap{max-width:100%;padding:0}
    body.theater .p-ratio{padding-top:0;height:calc(100vh - var(--hdr-h))!important}
    body.theater{overflow:hidden!important}

    /* ══ HK PLAYER ══ */
    .hk{position:absolute;inset:0;background:#000;direction:ltr}
    .hk video{width:100%;height:100%;object-fit:contain;display:block}

    /* Controls */
    .hk-bar{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;gap:6px;padding:6px 10px;background:linear-gradient(transparent,rgba(0,0,0,.88));z-index:10;direction:ltr;transition:opacity .35s}
    .hk:not(:hover) .hk-bar:not(.vis){opacity:0}
    .hk-bar.vis{opacity:1}
    .hk-btn{background:none;border:none;color:#fff;cursor:pointer;padding:6px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:background .15s}
    .hk-btn:hover{background:rgba(255,255,255,.15)}
    .hk-spacer{flex:1}

    /* Volume */
    .hk-vol{display:flex;align-items:center;gap:2px}
    .hk-vslider{width:56px;height:3px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.25);border-radius:2px;outline:none;cursor:pointer}
    .hk-vslider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#fff;cursor:pointer}

    /* Time */
    .hk-time{font-size:.68rem;font-weight:600;color:rgba(255,255,255,.6);font-family:'Outfit',sans-serif;white-space:nowrap}

    /* Buffering */
    .hk-buf{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:5;pointer-events:none}
    .hk-buf.hide{display:none}
    .hk-spin{width:40px;height:40px;border:3px solid rgba(255,255,255,.12);border-top-color:var(--gold);border-radius:50%;animation:spin .75s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Big play */
    .hk-big{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:6;cursor:pointer}
    .hk-big.hide{display:none}
    .hk-big-ico{width:60px;height:60px;border-radius:50%;background:rgba(201,162,39,.9);display:flex;align-items:center;justify-content:center;transition:transform .2s;box-shadow:0 4px 20px rgba(0,0,0,.4)}
    .hk-big:hover .hk-big-ico{transform:scale(1.08)}

    /* Offline */
    .hk-off{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:rgba(0,0,0,.65);z-index:4;color:var(--text2);font-size:.85rem;pointer-events:none;direction:ltr}
    .hk-off.hide{display:none}
    .hk-off svg{width:40px;height:40px;opacity:.25}

    /* Stats */
    .hk-stats{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.82);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;color:#fff;font-size:.7rem;z-index:20;min-width:150px;display:none;backdrop-filter:blur(10px);direction:ltr}
    .hk-stats.vis{display:block}
    .hk-sr{display:flex;justify-content:space-between;margin:3px 0}
    .hk-sr span:first-child{color:rgba(255,255,255,.35)}

    /* Double-tap overlay */
    .hk-tap{position:absolute;top:50%;transform:translateY(-50%);width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;z-index:15;pointer-events:none;opacity:0;transition:opacity .2s;direction:ltr}
    .hk-tap.show{opacity:1}
    .hk-tap.fw{right:15%}
    .hk-tap.rw{left:15%}
    .hk-tap-label{font-size:1.4rem;font-weight:800;color:#fff;font-family:'Outfit',sans-serif}

    /* ══ PASSWORD ══ */
    #pw-overlay{position:fixed;inset:0;z-index:10000;display:none;align-items:center;justify-content:center;padding:16px;background:rgba(7,7,15,.97);backdrop-filter:blur(24px)}
    #pw-overlay>div{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:380px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.6)}
    .pw-logo{font-family:'Outfit',sans-serif;font-size:2rem;font-weight:900;color:var(--gold);margin-bottom:10px}
    #pw-overlay h3{font-size:1.1rem;font-weight:700;margin-bottom:6px;color:#fff}
    #pw-overlay p{font-size:.85rem;color:var(--text2);margin-bottom:20px}
    #pw-overlay input{width:100%;padding:11px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-family:'Tajawal',sans-serif;font-size:1rem;outline:none;text-align:center;margin-bottom:14px;transition:border-color .2s}
    #pw-overlay input:focus{border-color:var(--gold)}
    #pw-overlay button{width:100%;padding:11px;background:var(--gold);border:none;border-radius:8px;color:#000;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;cursor:pointer}
    #pw-overlay button:hover{background:var(--gold-l)}
    #pw-error{color:#ff5555;font-size:.82rem;font-weight:700;margin-top:12px;display:none}
  </style>
</head>

  <script src="/js/matches-common.js?v=5"></script>
  <script>
  (function(){
    var hls=null,vid=null,hbTimer=null,ctrlTimer=null;
    var URL_M3U8=location.protocol+'//'+location.host+'/llhls/app/stream/master.m3u8';
    var lastTap=0;

    function $(id){return document.getElementById(id)}

    function createPlayer(){
      vid=$('vid');if(!vid)return;
      if(Hls.isSupported()){
        hls=new Hls({
          liveSyncDurationCount:3,liveMaxLatencyDurationCount:6,
          maxBufferLength:15,maxMaxBufferLength:30,backBufferLength:30,
          lowLatencyMode:true,enableWorker:true
        });
        hls.loadSource(URL_M3U8);hls.attachMedia(vid);
        hls.on(Hls.Events.MANIFEST_PARSED,function(){show('hkBig');vid.play().catch(function(){show('hkBig')})});
        hls.on(Hls.Events.ERROR,function(e,d){if(d.fatal){hls.destroy();hls=null;setTimeout(createPlayer,3000)}});
        vid.addEventListener('waiting',function(){show('hkBuf')});
        vid.addEventListener('playing',function(){hide('hkBuf');hide('hkOff')});
        vid.addEventListener('play',function(){setPlayIco(true)});
        vid.addEventListener('pause',function(){setPlayIco(false)});
      }else if(vid.canPlayType('application/vnd.apple.mpegurl')){
        vid.src=URL_M3U8;vid.addEventListener('loadedmetadata',function(){vid.play().catch(function(){})});
      }else{show('hkOff')}
      startHB();
    }

    function show(id){var e=$(id);if(e)e.classList.remove('hide')}
    function hide(id){var e=$(id);if(e)e.classList.add('hide')}
    function vis(id){var e=$(id);if(e)e.classList.add('vis')}
    function invis(id){var e=$(id);if(e)e.classList.remove('vis')}

    function setPlayIco(p){
      var a=$('icoPlay'),b=$('icoPause');
      if(a)a.style.display=p?'none':'block';
      if(b)b.style.display=p?'block':'none';
    }

    function updateStats(){
      if(!hls||!vid)return;
      var r=$('sRes'),bf=$('sBuf'),bt=$('sBit');
      if(r)r.textContent=(vid.videoWidth||'?')+'×'+(vid.videoHeight||'?');
      if(bf)bf.textContent=vid.buffered.length?(vid.buffered.end(vid.buffered.length-1)-vid.currentTime).toFixed(1)+'s':'—';
      if(bt&&hls.levels&&hls.currentLevel>=0)bt.textContent=Math.round(hls.levels[hls.currentLevel].bitrate/1000)+' kbps';
    }

    function bindControls(){
      function togglePlay(){
        if(!vid)return;hide('hkBig');
        if(vid.paused)vid.play().catch(function(){});else vid.pause();
      }
      var pb=$('btnPlay'),bp=$('hkBig'),v=$('vid');
      if(pb)pb.onclick=togglePlay;
      if(bp)bp.onclick=togglePlay;

      /* Volume */
      var vb=$('btnVol'),vs=$('volSlider');
      if(vb)vb.onclick=function(){
        if(!vid)return;vid.muted=!vid.muted;
        var vi=$('icoVol'),mi=$('icoMute');
        if(vi)vi.style.display=vid.muted?'none':'block';
        if(mi)mi.style.display=vid.muted?'block':'none';
      };
      if(vs)vs.oninput=function(){
        if(vid){vid.volume=this.value/100;vid.muted=false}
        var vi=$('icoVol'),mi=$('icoMute');
        if(vi)vi.style.display='block';if(mi)mi.style.display='none';
      };

      /* Stats */
      $('btnStats').onclick=function(e){e.stopPropagation();var s=$('hkStats');s.classList.toggle('vis');updateStats()};
      document.addEventListener('click',function(){$('hkStats').classList.remove('vis')});

      /* Theater */
      $('btnTheater').onclick=function(){
        document.body.classList.toggle('theater');
        var isT=document.body.classList.contains('theater');
        localStorage.setItem('theater',isT?'on':'off');
        var w=$('icoWide'),c=$('icoCompact');
        if(w)w.style.display=isT?'none':'block';
        if(c)c.style.display=isT?'block':'none';
        if($('btnTheater'))$('btnTheater').title=isT?'عرض عادي':'وضع المسرح';
      };

      /* Fullscreen */
      $('btnFs').onclick=function(){
        var box=document.querySelector('.p-box');
        if(document.fullscreenElement)document.exitFullscreen();
        else if(box)box.requestFullscreen().catch(function(){});
      };
      document.addEventListener('fullscreenchange',function(){
        var fs=!!document.fullscreenElement;
        var fi=$('icoFs'),fe=$('icoFsEx');
        if(fi)fi.style.display=fs?'none':'block';
        if(fe)fe.style.display=fs?'block':'none';
      });

      /* Auto-hide controls */
      var hk=$('hk'),bar=$('hkBar');
      if(hk){
        hk.addEventListener('mousemove',function(){bar.classList.add('vis');clearTimeout(ctrlTimer);ctrlTimer=setTimeout(function(){bar.classList.remove('vis')},3000)});
        hk.addEventListener('mouseleave',function(){bar.classList.remove('vis')});
      }

      /* Double-tap for mobile */
      var tapCount=0,tapTimer=null;
      if(v){
        v.addEventListener('click',function(e){
          var now=Date.now();
          var rect=v.getBoundingClientRect();
          var x=e.clientX-rect.left;
          var w=rect.width;
          tapCount++;
          if(tapCount===1){
            tapTimer=setTimeout(function(){
              if(tapCount===1){togglePlay()}
              tapCount=0;
            },250);
          }else if(tapCount===2){
            clearTimeout(tapTimer);tapCount=0;
            if(x<w/3){
              /* Double-tap left = rewind 10s */
              vid.currentTime=Math.max(0,vid.currentTime-10);
              showTapOverlay('tapRw');
            }else if(x>w*2/3){
              /* Double-tap right = forward 10s */
              vid.currentTime=Math.min(vid.duration||Infinity,vid.currentTime+10);
              showTapOverlay('tapFw');
            }else{
              togglePlay();
            }
          }
        });
      }

      setInterval(updateStats,2000);
    }

    function showTapOverlay(id){
      var el=$(id);if(!el)return;
      el.classList.add('show');
      setTimeout(function(){el.classList.remove('show')},400);
    }

    function startHB(){
      if(hbTimer)clearInterval(hbTimer);
      hbTimer=setInterval(function(){
        fetch('/tracker-api/heartbeat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({quality:'source',player_type:'main'}),keepalive:true}).catch(function(){});
      },15000);
    }

    document.addEventListener('DOMContentLoaded',bindControls);
    window._initPlayer=createPlayer;
  })();

  /* ══ PASSWORD ══ */
  function $(id){return document.getElementById(id)}

  function _showPW(){$('pw-overlay').style.display='flex'}
  function _hidePW(){$('pw-overlay').style.display='none'}

  function _getTToken(){
    if(!window.turnstile)return'';
    try{var el=document.querySelector('[name="cf-turnstile-response"]');return el?el.value:''}catch(e){return''}
  }

  function verifyPW(pass,silent){
    var p={password:pass};var t=_getTToken();if(t)p['cf-turnstile-response']=t;
    fetch('/tracker-api/stream/password-verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)})
    .then(function(r){return r.json()}).then(function(d){
      if(d.valid){localStorage.setItem('stream_password',pass);_hidePW();window._initPlayer()}
      else{
        localStorage.removeItem('stream_password');
        if(!silent){$('pw-error').style.display='block';$('pw-input').style.borderColor='#ff5255';$('pw-input').value=''}
        else _showPW();
      }
    }).catch(function(){window._initPlayer()});
  }

  function initPlayer(){
    fetch('/tracker-api/stream/password-check',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}',cache:'no-store'})
    .then(function(r){return r.json()}).then(function(d){
      if(d.protected){var s=localStorage.getItem('stream_password')||'';if(s)verifyPW(s,true);else _showPW()}
      else window._initPlayer();
    }).catch(function(){window._initPlayer()});
  }

  function submitPW(){var p=$('pw-input').value;if(p)verifyPW(p,false)}

  /* ══ MATCH CARD ══ */
  var _mt=null,_lmT=null,_lmD=null,_lmS=null,_upUtc=null,_isLive=false,_kickFired=false;
  function _hmT(u){try{return window.saudiTime(u)}catch(e){return''}}
  function _fmtTime(ms){var ts=Math.floor(ms/1000),h=Math.floor(ts/3600),m=Math.floor((ts%3600)/60),s=ts%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}
  function _fmtMatch(ms){var ts=Math.floor(ms/1000),half=Math.floor(ts/2700),min=Math.floor((ts%2700)/60);return(half>=1?(45+min):min)+':'+String(ts%60).padStart(2,'0')}

  function _fillCard(m,st){
    var ce=$('matchCard'),te=$('mcTag'),hc=$('mcHCrest'),hn=$('mcHName'),cc=$('mcCenter'),ac=$('mcACrest'),an=$('mcAName'),cd=$('mcCd');
    if(!ce||!m){if(ce)ce.style.display='none';return}
    var isL=(st==='live'),isD=(st==='done'),h=m.homeTeam||{},a=m.awayTeam||{},sc=m.score||{};
    hc.src=h.crest||'';hn.textContent=teamAr(h.shortName||h.name||'');
    ac.src=a.crest||'';an.textContent=teamAr(a.shortName||a.name||'');
    te.className='mc-tag';
    if(isL){te.textContent='مباشر';te.classList.add('live')}
    else if(isD){te.textContent='انتهت';te.classList.add('done')}
    else{te.textContent='التالية';te.classList.add('next')}
    if(isL){cc.className='mc-center live-sc';cc.textContent=(sc.home!=null?sc.home:0)+' - '+(sc.away!=null?sc.away:0)}
    else if(isD){cc.className='mc-center';cc.textContent=(sc.home!=null?sc.home:0)+' - '+(sc.away!=null?sc.away:0)}
    else{cc.className='mc-center time';cc.textContent=_hmT(m.utcDate)}
    if(cd)cd.style.display='none';
    ce.classList.toggle('is-live',isL);ce.classList.toggle('is-done',isD);ce.style.display='flex';
  }

  function updateMatch(matches){
    matches=(matches||[]).filter(function(m){return m.status!=='CANCELLED'&&m.status!=='POSTPONED'});
    var now=Date.now(),sorted=matches.slice().sort(function(a,b){return new Date(a.utcDate)-new Date(b.utcDate)});
    var live=sorted.filter(function(m){return STATUS_LIVE[m.status]});
    var upcoming=sorted.filter(function(m){return!STATUS_DONE[m.status]&&!STATUS_LIVE[m.status]&&new Date(m.utcDate).getTime()>now-60000});
    var done=sorted.filter(function(m){return STATUS_DONE[m.status]});
    var primary=null,ps=null;
    if(live.length){primary=live[0];ps='live'}
    else if(upcoming.length){primary=upcoming[0];ps='upcoming'}
    else if(done.length){primary=done[done.length-1];ps='done'}
    _fillCard(primary,ps);
    var dot=$('hdrDot');if(dot)dot.classList.toggle('on',ps==='live');
    _isLive=(ps==='live');_lmD=primary;
    _upUtc=(ps==='upcoming'&&primary)?primary.utcDate:null;_kickFired=false;
    if(_isLive&&primary){_lmS=new Date(primary.utcDate).getTime();startLC();startAR()}else{stopLC();stopAR()}
    scheduleSR();
  }

  function startLC(){stopLC();_lmT=setInterval(function(){
    if(!_lmS||!_lmD)return;var el=Date.now()-_lmS;
    var cc=$('mcCenter'),cd=$('mcCd');
    if(cc){var sc=_lmD.score||{};cc.textContent=(sc.home!=null?sc.home:0)+' - '+(sc.away!=null?sc.away:0)}
    if(cd){cd.textContent=_fmtMatch(el);cd.style.display='inline-flex'}
  },1000)}
  function stopLC(){if(_lmT){clearInterval(_lmT);_lmT=null}}

  var _arT=null;
  function startAR(){stopAR();_arT=setInterval(function(){if(window.loadMatches)loadMatches()},30000)}
  function stopAR(){if(_arT){clearInterval(_arT);_arT=null}}

  function scheduleSR(){
    if(_mt)clearTimeout(_mt);
    var iv=_isLive?60000:(_upUtc?((new Date(_upUtc).getTime()-Date.now()<300000)?30000:300000):300000);
    _mt=setTimeout(function(){if(window.loadMatches)loadMatches()},iv);
  }

  (function(){
    window.loadMatches=function(){
      fetch('/tracker-api/matches').then(function(r){return r.json()}).then(function(d){updateMatch(d.matches||[])}).catch(function(){scheduleSR()});
    };
    document.addEventListener('DOMContentLoaded',function(){loadMatches();initPlayer()});
  })();

  setInterval(function(){
    var now=Date.now();
    if(_upUtc&&!_isLive){
      var diff=new Date(_upUtc).getTime()-now;
      var cd=$('mcCd'),ce=$('matchCard');
      if(cd&&ce&&ce.style.display!=='none'){
        if(diff>0){cd.textContent=_fmtTime(diff);cd.style.display='inline-flex';cd.classList.toggle('hot',diff<300000)}
        else cd.style.display='none';
      }
    }
    if(_upUtc){var d=new Date(_upUtc).getTime()-now;if(d<=0&&!_kickFired){_kickFired=true;if(window.loadMatches)loadMatches()}}
  },1000);

  /* SSE */
  var _sseR=0;
  (function(){
    if(!window.EventSource)return;
    var es=new EventSource('/tracker-api/public/stats/live');
    es.onmessage=function(e){_sseR=0;try{var d=JSON.parse(e.data);var vc=$('viewerCount');if(vc)vc.textContent=d.viewers||0;var dot=$('hdrDot');if(dot)dot.classList.toggle('on',!!d.online)}catch(e){}};
    es.onerror=function(){es.close();_sseR++;setTimeout(arguments.callee,Math.min(_sseR*3000,30000))};
  })();

  /* Init */
  (function(){
    if(localStorage.getItem('theater')==='off')document.body.classList.remove('theater');
    else document.body.classList.add('theater');
    var w=$('icoWide'),c=$('icoCompact');
    var isT=document.body.classList.contains('theater');
    if(w)w.style.display=isT?'none':'block';
    if(c)c.style.display=isT?'block':'none';
  })();

  if('serviceWorker' in navigator)window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(){})});
  </script>

  <div id="pw-overlay">
    <div>
      <div class="pw-logo">H &amp; K</div>
      <h3>البث محمي بكلمة مرور</h3>
      <p>أدخل كلمة المرور لمشاهدة البث</p>
      <input type="password" id="pw-input" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')submitPW()">
      <div id="cf-turnstile-container" class="cf-turnstile" data-sitekey="0x4AAAAAADzThLYFcQ5nSka4" data-theme="dark" style="margin-bottom:14px;display:flex;justify-content:center"></div>
      <button onclick="submitPW()">دخول</button>
      <div id="pw-error" style="color:#ff5555;font-size:.82rem;font-weight:700;margin-top:12px;display:none">كلمة المرور غير صحيحة</div>
    </div>
  </div>
</body>
</html>
