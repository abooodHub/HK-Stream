<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
  <meta name="robots" content="noindex,nofollow"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#07070f"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>H&amp;K — بث مباشر</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&family=Outfit:wght@600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/fonts.css?v=2">
  <link rel="stylesheet" href="/css/common.css?v=303">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

  <style>
  /* ── index.html — page-specific overrides ── */

  /* Header layout */
  .site-header{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:var(--header-h);gap:12px;direction:ltr}
  .hdr-brand{display:flex;align-items:center;gap:6px;text-decoration:none;flex-shrink:0}
  .hdr-logo{font-family:var(--font-en);font-size:1.45rem;font-weight:700;color:var(--gold);letter-spacing:-.5px}
  .live-pill{font-size:.6rem;padding:1px 6px;gap:4px}
  .live-pill.off{background:rgba(100,100,120,.12);color:var(--text3);border-color:rgba(100,100,120,.2)}
  .live-dot{width:5px;height:5px}

  /* Match chips — horizontal row layout */
  .hdr-center{display:flex;align-items:center;gap:10px;flex:1;justify-content:center;overflow:hidden;min-width:0}
  .match-chip{display:none;flex-direction:column;align-items:center;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:8px 16px;cursor:pointer;text-decoration:none;color:var(--text);transition:all .25s var(--ease);white-space:nowrap;min-width:200px;max-width:320px;text-align:center}
  .match-chip:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.12);transform:translateY(-1px);box-shadow:0 4px 15px rgba(0,0,0,.2)}
  .match-chip.live-chip{border-color:rgba(220,40,40,.3);background:rgba(220,40,40,.06);animation:live-pulse 2s ease-in-out infinite}
  @keyframes live-pulse{0%,100%{box-shadow:0 0 0 0 rgba(220,40,40,0)}50%{box-shadow:0 0 12px 2px rgba(220,40,40,.15)}}
  .match-chip.done-chip{border-color:rgba(255,255,255,.05);background:rgba(255,255,255,.02);opacity:.7}

  /* Chip top row: team1 — time — team2 */
  .chip-main-row{display:flex;align-items:center;gap:6px}
  .chip-team{display:flex;align-items:center;gap:4px;min-width:0}
  .chip-crest{width:20px;height:20px;object-fit:contain;border-radius:2px;flex-shrink:0}
  .chip-team-name{font-size:.82rem;font-weight:700;color:var(--text);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .chip-vs{font-size:.85rem;font-weight:800;color:var(--gold);padding:0 4px;flex-shrink:0}
  .chip-vs.live-time{color:#ff5252;font-family:var(--font-en);animation:live-text 1.5s ease-in-out infinite}
  @keyframes live-text{0%,100%{opacity:1}50%{opacity:.6}}

  /* Tag badges */
  .chip-tag{font-size:.55rem;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:.3px;white-space:nowrap;line-height:1.3;margin-bottom:2px}
  .chip-tag.live-tag{background:rgba(220,40,40,.2);color:#ff5252;border:1px solid rgba(220,40,40,.3)}
  .chip-tag.upcoming-tag{background:rgba(201,162,39,.12);color:var(--gold);border:1px solid rgba(201,162,39,.2)}
  .chip-tag.done-tag{background:rgba(255,255,255,.06);color:var(--text3);border:1px solid rgba(255,255,255,.08)}

  /* Countdown */
  .chip-cd{font-size:.65rem;font-weight:700;color:var(--gold-l);background:rgba(201,162,39,.1);border:1px solid rgba(201,162,39,.18);border-radius:6px;padding:2px 8px;margin-top:4px;display:inline-flex;align-items:center;gap:4px;font-variant-numeric:tabular-nums}
  .chip-cd.urgent{color:#ff5252;background:rgba(220,40,40,.1);border-color:rgba(220,40,40,.2);animation:live-text 1s ease-in-out infinite}

  .chip-ht{font-size:.55rem;color:var(--text3);font-weight:600;margin-top:2px}

  /* Header right */
  .hdr-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .hdr-btn{display:flex;align-items:center;gap:4px;padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-family:var(--font);font-size:.88rem;font-weight:700;transition:all .2s var(--ease);text-decoration:none;color:var(--text2);background:rgba(255,255,255,.05)}
  .hdr-btn:hover{background:rgba(255,255,255,.1);color:var(--text)}
  .hdr-btn svg{flex-shrink:0}
  .hdr-btn-lbl{display:block}
  .viewers-badge{display:flex;align-items:center;gap:4px;font-size:.9rem;font-weight:700;color:var(--text2);padding:8px 12px;border-radius:6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}
  .viewers-badge b{color:var(--text)}

  /* Player */
  .player-wrap{width:100%;max-width:900px;margin:0 auto;padding:12px 12px 0}
  .player-box{position:relative;width:100%;border-radius:var(--radius);overflow:hidden;background:#000;box-shadow:0 4px 40px rgba(0,0,0,.6)}
  .player-ratio{position:relative;width:100%;padding-top:56.25%}
  .player-inner{position:absolute;inset:0}

  /* Theater mode */
  body.player-compact .player-wrap{max-width:900px}
  body:not(.player-compact) .player-wrap{max-width:100%;padding:0}
  body:not(.player-compact) #playerContainer{border-radius:0;height:auto!important}
  body:not(.player-compact) .player-ratio{padding-top:0;height:calc(100vh - var(--header-h))!important}
  body:not(.player-compact){overflow:hidden!important}
  .thater-btn{position:relative}
  .thater-btn .thater-tooltip{position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a1a2e;color:var(--text);font-size:.72rem;font-weight:700;padding:5px 10px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:20;border:1px solid rgba(255,255,255,.1)}
  .thater-btn:hover .thater-tooltip{opacity:1}

  /* OvenPlayer dark theme overrides */
  .ovenplayer{width:100%!important;height:100%!important;border-radius:inherit;position:absolute!important;inset:0!important;background:#000!important}
  .ovenplayer .op-ratio{padding-top:0!important;height:100%!important}
  .ovenplayer .op-player{position:absolute!important;top:0!important;left:0!important;width:100%!important;height:100%!important}
  .ovenplayer video{width:100%!important;height:100%!important;object-fit:contain!important}

  /* Stats overlay */
  #stats-nerds{display:none;position:absolute;top:10px;right:10px;background:rgba(0,0,0,.85);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:14px 18px;color:#fff;font-size:.78rem;z-index:20;min-width:180px;backdrop-filter:blur(10px)}
  #stats-nerds.show{display:block}
  .stats-close{cursor:pointer;color:var(--text3);margin-bottom:10px;font-size:.75rem;text-align:right}
  .stats-close:hover{color:#fff}
  .stats-row{display:flex;justify-content:space-between;margin:5px 0}
  .stats-row span:first-child{color:var(--text3)}

  /* Offline placeholder */
  .offline-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(0,0,0,.7);z-index:5;color:var(--text2);font-size:.9rem;pointer-events:none}
  .offline-placeholder svg{width:48px;height:48px;opacity:.3}

  /* Responsive chip visibility */
  @media(max-width:1100px){.match-chip{min-width:auto;padding:6px 10px}}
  @media(max-width:820px){#chipCur .chip-crest{display:none}#chipNxt .chip-crest{display:none}}
  @media(max-width:580px){.hdr-btn-lbl{display:none}.hdr-btn{padding:5px}}
  @media(max-width:360px){.hdr-logo{font-size:.9rem}.viewers-badge{font-size:.6rem}.match-chip{min-width:100px;padding:6px 10px}}

  /* Password overlay */
  #password-overlay{position:fixed;inset:0;z-index:10000;display:none;align-items:center;justify-content:center;padding:16px;background:rgba(7,7,15,.98);backdrop-filter:blur(20px)}
  #password-overlay>div{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:400px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.6)}
  .pw-logo{font-family:var(--font-en);font-size:2.2rem;font-weight:700;color:var(--gold);margin-bottom:12px}
  #password-overlay h3{font-size:1.15rem;font-weight:700;margin-bottom:8px;color:#fff}
  #password-overlay p{font-size:.88rem;color:var(--text2);margin-bottom:24px}
  #password-overlay input{width:100%;padding:12px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-family:var(--font);font-size:1rem;outline:none;text-align:center;margin-bottom:16px;transition:border-color .2s}
  #password-overlay input:focus{border-color:var(--gold)}
  #password-overlay button{width:100%;padding:12px;background:var(--gold);border:none;border-radius:8px;color:#000;font-family:var(--font);font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s}
  #password-overlay button:hover{background:var(--gold-l)}
  #cf-turnstile-container{margin-bottom:16px;display:flex;justify-content:center}
  #cf-turnstile-container iframe{max-width:100%}
  </style>
</head>
<body class="player-compact">

  <!-- ═══════════ HEADER ═══════════ -->
  <header class="site-header">
    <a class="hdr-brand" href="/" title="H&amp;K Stream">
      <span class="hdr-logo-icon">H &amp; K</span>

        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" id="thaterIconCompact" style="display:none"><path d="M19 19H5V5h14v14zM3 3v18h18V3H3z"/></svg>

  <!-- ═══════════ PLAYER ═══════════ -->
  <div class="player-wrap">
    <div class="player-box">
      <div class="player-ratio">
        <div class="player-inner">
          <div id="playerContainer" style="width:100%;height:100%;background:#000"></div>

          <!-- Stats Overlay -->
          <div id="stats-nerds">

            <div class="stats-row"><span>Resolution</span><span id="stat-res">—</span></div>

  <div id="toast"></div>
  <footer class="site-footer">H&amp;K Stream</footer>

  <!-- OvenPlayer -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
  <script src="/js/ovenplayer.js?v=1"></script>
  <script src="/js/matches-common.js?v=2"></script>

  <script>
  /* ═══════════════════════════════════════
     OvenPlayer + Password Protection + Turnstile
     ═══════════════════════════════════════ */
  var ovenPlayer = null;
  var _passwordVerified = false;
  var _passwordCheckDone = false;
  var TURNSTILE_SITEKEY = '0x4AAAAAADzThLYFcQ5nSka4';
  var _turnstileWidgetId = null;

  function _renderTurnstile() {
    // Turnstile renders automatically via data-sitekey attribute
  }

  function _getTurnstileToken() {
    if (!window.turnstile) return '';
    try {
      var el = document.querySelector('#cf-turnstile-container .cf-turnstile-response, [name="cf-turnstile-response"]');
      return el ? el.value : '';
    } catch(e) { return ''; }
  }

  function _proceedInitPlayer() {
    if (ovenPlayer) return;
    var container = document.getElementById('playerContainer');
    if (!container) return;
    container.innerHTML = '';

    var wsProto = (location.protocol === 'https:') ? 'wss:' : 'ws:';
    var wsUrl = wsProto + '//' + location.host + '/ws/live/stream';
    var llhlsUrl = location.protocol + '//' + location.host + '/llhls/live/stream/llhls.m3u8';

    ovenPlayer = OvenPlayer.create(container, {
      sources: [
        { type: 'webrtc', file: wsUrl, label: 'WebRTC' },
        { type: 'hls', file: llhlsUrl, label: 'LLHLS' }
      ],
      autoStart: true,
      mute: false,
      volume: 100,
      controls: true,
      controlBar: { autohide: true, autohideTimeout: 3000 },
      playbackRate: { display: false },
      hlsConfig: {
        liveSyncDuration: 2,
        liveMaxLatencyDuration: 8,
        maxBufferLength: 10,
        maxMaxBufferLength: 30,
        lowLatencyMode: true
      }
    });

    ovenPlayer.on('error', function(err) {
      console.warn('OvenPlayer error:', err);
    });

    ovenPlayer.on('stateChanged', function(e) {
      var pill = document.getElementById('live-pill');
      var text = document.getElementById('live-text');
      if (!pill || !text) return;
      if (e.state === 'playing') {
        pill.classList.remove('off');
        text.textContent = 'مباشر';
      } else if (e.state === 'idle' || e.state === 'error') {
        pill.classList.add('off');
        text.textContent = 'غير متصل';
      }
    });

    ovenPlayer.on('metaChanged', function(meta) {
      var el = document.getElementById('stat-res');
      if (el && meta) {
        el.textContent = (meta.videoWidth || '?') + 'x' + (meta.videoHeight || '?');
      }
    });

    var _hbInterval = null;
    function _sendHeartbeat() {
      var quality = 'auto';
      try { var m = ovenPlayer.getCurrentQuality(); if (m && m.label) quality = m.label; } catch(e) {}
      fetch('/tracker-api/heartbeat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ quality: quality, player_type: 'main' }),
        keepalive: true
      }).catch(function() {});
    }
    ovenPlayer.on('stateChanged', function(e) {
      if (e.state === 'playing') {
        _sendHeartbeat();
        if (!_hbInterval) _hbInterval = setInterval(_sendHeartbeat, 15000);
      } else if (e.state === 'idle' || e.state === 'error') {
        if (_hbInterval) { clearInterval(_hbInterval); _hbInterval = null; }
      }
    });
  }

  /* ── Password Protection ── */
  function _showPasswordOverlay() {
    var ov = document.getElementById('password-overlay');
    if (ov) ov.style.display = 'flex';
    _renderTurnstile();
  }
  function _hidePasswordOverlay() {
    var ov = document.getElementById('password-overlay');
    if (ov) ov.style.display = 'none';
  }

  function verifyPassword(pass, silent) {
    var turnstileToken = _getTurnstileToken();
    var payload = { password: pass };
    if (turnstileToken) payload['cf-turnstile-response'] = turnstileToken;

    fetch('/tracker-api/stream/password-verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.valid) {
        localStorage.setItem('stream_password', pass);
        _passwordVerified = true;
        _hidePasswordOverlay();
        _proceedInitPlayer();
      } else {
        localStorage.removeItem('stream_password');
        if (!silent) {
          var err = document.getElementById('password-error');
          if (err) err.style.display = 'block';
          var inp = document.getElementById('stream-password-input');
          if (inp) { inp.style.borderColor = '#ff5555'; inp.value = ''; }
          if (window.turnstile && _turnstileWidgetId !== null) {
            try { turnstile.reset(_turnstileWidgetId); } catch(e) {}
          }
        } else {
          _showPasswordOverlay();
        }
      }
    }).catch(function() {
      _proceedInitPlayer();
    });
  }

  function initPlayer() {
    if (_passwordCheckDone) return;
    fetch('/tracker-api/stream/password-check', { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}', cache: 'no-store' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        _passwordCheckDone = true;
        if (data.protected) {
          var saved = localStorage.getItem('stream_password') || '';
          if (saved) {
            verifyPassword(saved, true);
          } else {
            _showPasswordOverlay();
          }
        } else {
          _passwordVerified = true;
          _proceedInitPlayer();
        }
      }).catch(function() {
        _passwordCheckDone = true;
        _passwordVerified = true;
        _proceedInitPlayer();
      });
  }

  function submitStreamPassword() {
    var pass = document.getElementById('stream-password-input').value;
    if (pass) verifyPassword(pass, false);
  }

  /* ── Stats Panel ── */
  function toggleStats() {
    document.getElementById('stats-nerds').classList.toggle('show');
  }

  /* ── Theater Mode Toggle ── */
  function toggleTheater() {
    document.body.classList.toggle('player-compact');
    var isCompact = document.body.classList.contains('player-compact');
    localStorage.setItem('theater_mode', isCompact ? 'compact' : 'wide');
    _updateTheaterBtn();
  }
  function _updateTheaterBtn() {
    var isCompact = document.body.classList.contains('player-compact');
    var w = document.getElementById('thaterIconWide');
    var c = document.getElementById('thaterIconCompact');
    var lbl = document.getElementById('thaterLabel');
    var tip = document.getElementById('thaterTooltip');
    if (w) w.style.display = isCompact ? 'block' : 'none';
    if (c) c.style.display = isCompact ? 'none' : 'block';
    if (lbl) lbl.textContent = isCompact ? 'توسيط' : 'عرض كامل';
    if (tip) tip.textContent = isCompact ? 'عرض كامل' : 'توسيط';
  }
  (function(){
    var saved = localStorage.getItem('theater_mode');
    if (saved === 'wide') document.body.classList.remove('player-compact');
    _updateTheaterBtn();
  })();

  /* ═══ Header Match Chips & Live Timer ═══ */
  var _matchTimer = null;
  var _liveMatchTimer = null;
  var _liveMatchData = null;
  var _liveMatchStartUtc = null;
  var _lastScore = null;
  var _soonestUpcomingUtc = null;
  var _nxtMatchUtc = null;
  var _curIsLive = false;
  var _kickoffFired = false;

  function _hmTime(utc) {
    try { return window.saudiTime(utc); } catch(e) { return ''; }
  }

  function _formatMatchTime(ms) {
    var totalSec = Math.floor(ms / 1000);
    var half = Math.floor(totalSec / 2700);
    var min = Math.floor((totalSec % 2700) / 60);
    return (half >= 1 ? (45 + min) : min) + ':' + String(totalSec % 60).padStart(2, '0');
  }

  function _fillChip(match, chipEl, tagEl, hImgEl, hNameEl, midEl, aImgEl, aNameEl, htEl, state) {
    if (!chipEl || !match) { if (chipEl) chipEl.style.display = 'none'; return; }

    var isLive = (state === 'live'), isDone = (state === 'done');
    var h = match.homeTeam || {}, a = match.awayTeam || {}, sc = match.score || {};

    hImgEl.src = h.crest || '';
    hNameEl.textContent = teamAr(h.shortName || h.name || '');
    aImgEl.src = a.crest || '';
    aNameEl.textContent = teamAr(a.shortName || a.name || '');

    /* Tag */
    if (tagEl) {
      tagEl.className = 'chip-tag';
      if (isLive) { tagEl.textContent = 'مباشر'; tagEl.classList.add('live-tag'); }
      else if (isDone) { tagEl.textContent = 'انتهت'; tagEl.classList.add('done-tag'); }
      else { tagEl.textContent = 'التالية'; tagEl.classList.add('upcoming-tag'); }
    }

    /* Center — score or time */
    if (isLive) {
      midEl.className = 'chip-vs live-time';
      midEl.textContent = (sc.home != null ? sc.home : 0) + ' - ' + (sc.away != null ? sc.away : 0);
    } else if (isDone) {
      midEl.className = 'chip-vs';
      midEl.textContent = (sc.home != null ? sc.home : 0) + ' - ' + (sc.away != null ? sc.away : 0);
    } else {
      midEl.className = 'chip-vs';
      midEl.textContent = _hmTime(match.utcDate);
    }

    /* Half-time */
    if (htEl) {
      if ((isLive || isDone) && sc.htHome != null && sc.htHome !== undefined) {
        htEl.textContent = '(' + sc.htHome + '-' + sc.htAway + ' ش.أ)';
        htEl.style.display = 'block';
      } else {
        htEl.style.display = 'none';
      }
    }

    chipEl.classList.toggle('live-chip', isLive);
    chipEl.classList.toggle('done-chip', isDone);
    chipEl.style.display = 'flex';
  }

  function updateHeaderMatch(matches) {
    matches = (matches || []).filter(function(m) {
      return m.status !== 'CANCELLED' && m.status !== 'POSTPONED';
    });

    var now = Date.now();
    var byDate = function(a, b) { return new Date(a.utcDate) - new Date(b.utcDate); };
    var sorted = matches.slice().sort(byDate);

    var live = sorted.filter(function(m) { return STATUS_LIVE[m.status]; });
    var upcoming = sorted.filter(function(m) {
      return !STATUS_DONE[m.status] && !STATUS_LIVE[m.status] && new Date(m.utcDate).getTime() > now - 60000;
    });
    var finished = sorted.filter(function(m) { return STATUS_DONE[m.status]; });

    var primary = null, pstate = null;
    if (live.length) { primary = live[0]; pstate = 'live'; }
    else if (upcoming.length) { primary = upcoming[0]; pstate = 'upcoming'; }
    else if (finished.length) { primary = finished[finished.length - 1]; pstate = 'done'; }

    var secondary = null;
    if (primary) {
      var pk = new Date(primary.utcDate).getTime();
      for (var i = 0; i < upcoming.length; i++) {
        if (new Date(upcoming[i].utcDate).getTime() > pk) { secondary = upcoming[i]; break; }
      }
    } else if (upcoming.length) { secondary = upcoming[0]; }

    _fillChip(primary,
      document.getElementById('chipCur'), document.getElementById('chipCurTag'),
      document.getElementById('chipCurHImg'), document.getElementById('chipCurH'),
      document.getElementById('chipCurMid'),
      document.getElementById('chipCurAImg'), document.getElementById('chipCurA'),
      document.getElementById('chipCurHT'), pstate);

    _fillChip(secondary,
      document.getElementById('chipNxt'), document.getElementById('chipNxtTag'),
      document.getElementById('chipNxtHImg'), document.getElementById('chipNxtH'),
      document.getElementById('chipNxtMid'),
      document.getElementById('chipNxtAImg'), document.getElementById('chipNxtA'),
      null, 'upcoming');

    _curIsLive = (pstate === 'live');
    _liveMatchData = primary;
    _lastScore = null;
    _soonestUpcomingUtc = (pstate === 'upcoming') ? primary.utcDate : (secondary ? secondary.utcDate : null);
    _nxtMatchUtc = secondary ? secondary.utcDate : null;
    _kickoffFired = false;

    /* Start live match clock */
    if (_curIsLive && primary) {
      _liveMatchStartUtc = new Date(primary.utcDate).getTime();
      _startLiveClock();
      _startAutoRefresh();
    } else {
      _stopLiveClock();
      _stopAutoRefresh();
    }

    _scheduleSmartRefresh();
  }

  function _startLiveClock() {
    _stopLiveClock();
    _liveMatchTimer = setInterval(function() {
      if (!_liveMatchStartUtc || !_liveMatchData) return;
      var elapsed = Date.now() - _liveMatchStartUtc;
      var midEl = document.getElementById('chipCurMid');
      var cdEl = document.getElementById('chipCurCd');
      if (midEl) {
        var sc = _liveMatchData.score || {};
        midEl.textContent = (sc.home != null ? sc.home : 0) + ' - ' + (sc.away != null ? sc.away : 0);
      }
      if (cdEl) {
        cdEl.textContent = _formatMatchTime(elapsed);
        cdEl.style.display = 'inline-flex';
      }
    }, 1000);
  }
  function _stopLiveClock() { if (_liveMatchTimer) { clearInterval(_liveMatchTimer); _liveMatchTimer = null; } }

  var _autoRefreshTimer = null;
  function _startAutoRefresh() {
    _stopAutoRefresh();
    _autoRefreshTimer = setInterval(function() { if (window.loadMatches) loadMatches(); }, 30000);
  }
  function _stopAutoRefresh() { if (_autoRefreshTimer) { clearInterval(_autoRefreshTimer); _autoRefreshTimer = null; } }

  function _scheduleSmartRefresh() {
    if (_matchTimer) clearTimeout(_matchTimer);
    var iv = _curIsLive ? 60000 : (_soonestUpcomingUtc ? ((new Date(_soonestUpcomingUtc).getTime() - Date.now() < 300000) ? 30000 : 300000) : 300000);
    _matchTimer = setTimeout(function(){ if (window.loadMatches) loadMatches(); }, iv);
  }

  /* ── Matches API Loader ── */
  (function(){
    window.loadMatches = function() {
      fetch('/tracker-api/matches')
        .then(function(r) { return r.json(); })
        .then(function(d) {
          var all = d.matches || [];
          updateHeaderMatch(all);
        })
        .catch(function() { _scheduleSmartRefresh(); });
    };
    document.addEventListener('DOMContentLoaded', function() {
      loadMatches();
      initPlayer();
    });
  })();

  /* ── 1-Second Interval Loop ── */
  setInterval(function() {
    var now = Date.now();

    if (_nxtMatchUtc) {
      var diffNxt = new Date(_nxtMatchUtc).getTime() - now;
      var elNxt = document.getElementById('chipNxtCd');
      if (elNxt) {
        if (diffNxt > 0) {
          var h = Math.floor(diffNxt / 3600000);
          var m = Math.floor((diffNxt % 3600000) / 60000);
          var s = Math.floor((diffNxt % 60000) / 1000);
          elNxt.textContent = '⏱ ' + String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
          elNxt.style.display = 'inline-flex';
          elNxt.classList.toggle('urgent', diffNxt < 300000);
        } else {
          elNxt.textContent = '';
          elNxt.style.display = 'none';
        }
      }
    }

    if (_soonestUpcomingUtc) {
      var d = new Date(_soonestUpcomingUtc).getTime() - now;
      if (d <= 0 && !_kickoffFired) {
        _kickoffFired = true;
        if (window.loadMatches) loadMatches();
      }
    }
  }, 1000);

  /* ── Viewer Count (SSE) ── */
  var _sseRetries = 0;
  function connectSSE() {
    if (window.EventSource) {
      var evtSource = new EventSource('/tracker-api/public/stats/live');
      evtSource.onmessage = function(e) {
        _sseRetries = 0;
        try {
          var d = JSON.parse(e.data);
          var hv = document.getElementById('headViewersNum');
          if (hv) hv.textContent = d.viewers || 0;
          var pill = document.getElementById('live-pill');
          var text = document.getElementById('live-text');
          if (pill && text) {
            if (d.online) { pill.classList.remove('off'); text.textContent = 'مباشر'; }
            else { pill.classList.add('off'); text.textContent = 'غير متصل'; }
          }
        } catch(err) {}
      };
      evtSource.onerror = function() {
        evtSource.close();
        _sseRetries++;
        setTimeout(connectSSE, Math.min(_sseRetries * 3000, 30000));
      };
    } else {
      fetch('/tracker-api/public/stats/live').then(function(r){return r.json()}).then(function(d){
        var hv = document.getElementById('headViewersNum');
        if (hv) hv.textContent = d.viewers || 0;
      }).catch(function(){});
    }
  }
  document.addEventListener('DOMContentLoaded', function() { connectSSE(); });

  /* ── PWA Service Worker ── */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/sw.js').catch(function(){});
    });
  }
  </script>
