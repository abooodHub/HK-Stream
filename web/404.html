<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#07070f"/>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
  <title>404 Not Found - الصفحة غير موجودة</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/common.css?v=200">
  <style>
    body{
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;position:relative;
      background-image:
        radial-gradient(1000px 500px at 50% 20%, rgba(201,162,39,.06), transparent 65%),
        linear-gradient(160deg, var(--bg) 0%, #08080f 60%, var(--bg) 100%);
    }
    .container{
      text-align:center;padding:30px;z-index:10;
      animation:fadeIn .6s cubic-bezier(.22,1,.36,1);
    }
    .code{
      font-family:var(--font-en);
      font-size:clamp(6rem,15vw,10rem);font-weight:900;line-height:1;
      background:linear-gradient(135deg,var(--gold-xl),var(--gold));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      margin-bottom:10px;letter-spacing:-2px;
      filter:drop-shadow(0 10px 30px var(--gold-glow));
    }
    .title{
      font-size:1.8rem;font-weight:800;color:var(--text);margin-bottom:12px;
    }
    .desc{
      font-size:1rem;color:var(--text2);max-width:440px;
      margin:0 auto 32px;line-height:1.6;
    }
    .btn{
      display:inline-flex;align-items:center;gap:10px;
      padding:14px 32px;
      background:linear-gradient(135deg,var(--gold),var(--gold) 60%,#a88118);
      color:#06060c;text-decoration:none;font-weight:800;font-size:1rem;
      border-radius:30px;box-shadow:0 10px 24px -6px var(--gold-glow);
      transition:all .25s ease;border:1px solid rgba(255,255,255,.1);
    }
    .btn:hover{
      transform:translateY(-2px);filter:brightness(1.08);
      box-shadow:0 12px 30px var(--gold-glow);
    }
    .btn:active{transform:translateY(0)}
    .footer{
      position:absolute;bottom:24px;left:0;right:0;text-align:center;
      font-family:var(--font-en);font-size:.8rem;color:#434157;letter-spacing:1px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="code">404</div>
    <h1 class="title">صفحة غير موجودة - Not Found</h1>
    <p class="desc">عذراً، الرابط الذي تحاول الوصول إليه غير موجود أو تم نقله مؤقتاً.</p>
    <a href="/" class="btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transform: scaleX(-1);"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      العودة إلى الصفحة الرئيسية
    </a>
  </div>

  <div class="footer">nginx (A.aboodfull2.site)</div>

</body>
</html>
