<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#07070f"/>
  <title>لا يوجد اتصال — H&amp;K Stream</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/common.css?v=200">
  <style>
    body{display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
    .card{max-width:380px}
    .mark{font-family:var(--font-en);font-weight:900;font-size:48px;color:var(--gold);letter-spacing:-1px;margin-bottom:8px}
    .icon{font-size:56px;margin:18px 0;opacity:.85}
    h1{font-size:22px;font-weight:700;margin-bottom:10px}
    p{font-size:15px;line-height:1.7;color:var(--text2);margin-bottom:22px}
    button{background:var(--gold);color:#07070f;border:0;border-radius:12px;font-weight:700;font-size:16px;padding:12px 28px;cursor:pointer;transition:transform .12s,opacity .12s}
    button:active{transform:scale(.97)}
    button:hover{opacity:.92}
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">H&amp;K</div>
    <div class="icon">📡</div>
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>تعذّر الوصول إلى البثّ. تحقّق من اتصالك ثم أعد المحاولة.</p>
    <button onclick="location.reload()">إعادة المحاولة</button>
  </div>
  <script>
    window.addEventListener('online', function(){ location.reload(); });
  </script>
</body>
</html>
